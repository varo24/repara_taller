<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ReparaPro Master - Consola Técnica Local</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ReparaPro">
    <meta name="theme-color" content="#0f172a">
    <!-- Manifest injected by vite-plugin-pwa -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3062/3062331.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            margin: 0;
            -webkit-print-color-adjust: exact !important; 
            print-color-adjust: exact !important;
        }

        .print-only { display: none !important; }

        @media print {
            @page {
                margin: 0 !important;
                size: A4 portrait;
            }

            .no-print { display: none !important; }

            .print-only {
                display: block !important;
                visibility: visible !important;
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 210mm !important;
                height: 297mm !important;
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .a4-print-container {
                width: 210mm !important;
                height: 297mm !important;
                padding: 10mm !important;
                background: white !important;
                box-sizing: border-box !important;
                overflow: hidden !important;
            }

            html, body {
                background: white !important;
                width: 210mm !important;
                height: 297mm !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
